<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1400" viewBox="0 0 2200 1400">
  <defs>
    <style>
      .bg { fill: #f6f9fc; }
      .entity { fill: #ffffff; stroke: #2b7cee; stroke-width: 2.5; rx: 16; ry: 16; }
      .entity-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #111418; }
      .field { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .note { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #617289; }
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #111418; }
      .line { stroke: #64748b; stroke-width: 2.3; fill: none; }
      .dash { stroke: #94a3b8; stroke-width: 2.3; fill: none; stroke-dasharray: 10 8; }
      .label { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #475569; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="2200" height="1400" />
  <text class="title" x="1100" y="50" text-anchor="middle">Family Assistant ERD</text>
  <text class="note" x="1100" y="80" text-anchor="middle">Firestore-oriented entity relationship diagram derived from the current repository</text>

  <rect class="entity" x="90" y="130" width="360" height="170" />
  <text class="entity-title" x="270" y="165" text-anchor="middle">USER_PROFILE</text>
  <text class="field" x="115" y="200">PK uid</text>
  <text class="field" x="115" y="225">email</text>
  <text class="field" x="115" y="250">displayName</text>
  <text class="field" x="115" y="275">photoUrl</text>
  <text class="field" x="115" y="300">gender, emailVerified</text>

  <rect class="entity" x="520" y="110" width="380" height="250" />
  <text class="entity-title" x="710" y="145" text-anchor="middle">HEALTH_DATA</text>
  <text class="field" x="545" y="180">PK id</text>
  <text class="field" x="545" y="205">FK userUid</text>
  <text class="field" x="545" y="230">date</text>
  <text class="field" x="545" y="255">steps, stepGoal</text>
  <text class="field" x="545" y="280">sleepHours, waterLiters</text>
  <text class="field" x="545" y="305">calories, caloriesGoal</text>
  <text class="field" x="545" y="330">protein, proteinGoal, carbs, fat</text>
  <text class="field" x="545" y="355">activityMinutes, activityGoal</text>

  <rect class="entity" x="520" y="420" width="380" height="170" />
  <text class="entity-title" x="710" y="455" text-anchor="middle">MEAL_PLAN</text>
  <text class="field" x="545" y="490">PK date</text>
  <text class="field" x="545" y="515">FK userUid</text>
  <text class="field" x="545" y="540">totalCalories</text>
  <text class="field" x="545" y="565">createdAt, updatedAt</text>

  <rect class="entity" x="980" y="380" width="420" height="270" />
  <text class="entity-title" x="1190" y="415" text-anchor="middle">MEAL_ITEM (Embedded)</text>
  <text class="field" x="1005" y="450">PK mealId</text>
  <text class="field" x="1005" y="475">FK mealPlanDate</text>
  <text class="field" x="1005" y="500">type, name, description</text>
  <text class="field" x="1005" y="525">calories, protein, carbs, fats</text>
  <text class="field" x="1005" y="550">imageUrl, imagePrompt</text>
  <text class="field" x="1005" y="575">ingredientsJson</text>
  <text class="field" x="1005" y="600">instructionsJson</text>
  <text class="field" x="1005" y="625">date, createdAt</text>

  <rect class="entity" x="90" y="450" width="360" height="170" />
  <text class="entity-title" x="270" y="485" text-anchor="middle">WALLET</text>
  <text class="field" x="115" y="520">PK id</text>
  <text class="field" x="115" y="545">name</text>
  <text class="field" x="115" y="570">balance</text>
  <text class="field" x="115" y="595">isVirtual, createdAt</text>

  <rect class="entity" x="520" y="700" width="380" height="170" />
  <text class="entity-title" x="710" y="735" text-anchor="middle">EXPENSE</text>
  <text class="field" x="545" y="770">PK id</text>
  <text class="field" x="545" y="795">amount, category</text>
  <text class="field" x="545" y="820">type, source</text>
  <text class="field" x="545" y="845">FK walletId, note, createdAt</text>

  <rect class="entity" x="980" y="760" width="420" height="200" />
  <text class="entity-title" x="1190" y="795" text-anchor="middle">SHOPPING_SCHEDULE</text>
  <text class="field" x="1005" y="830">PK id</text>
  <text class="field" x="1005" y="855">title, amount, category</text>
  <text class="field" x="1005" y="880">dueDate</text>
  <text class="field" x="1005" y="905">paymentMode, status</text>
  <text class="field" x="1005" y="930">FK walletId, repeatCycle</text>
  <text class="field" x="1005" y="955">notes, createdAt</text>

  <rect class="entity" x="1520" y="700" width="420" height="170" />
  <text class="entity-title" x="1730" y="735" text-anchor="middle">CATEGORY_BUDGET</text>
  <text class="field" x="1545" y="770">PK id</text>
  <text class="field" x="1545" y="795">name</text>
  <text class="field" x="1545" y="820">monthlyBudget</text>
  <text class="field" x="1545" y="845">totalSpent, updatedAt</text>

  <path class="line" d="M450 210 L520 210" />
  <text class="label" x="485" y="195">1 to many</text>
  <path class="line" d="M450 240 L520 500" />
  <text class="label" x="495" y="380">1 to many</text>
  <path class="line" d="M900 500 L980 500" />
  <text class="label" x="940" y="485">1 to many embedded</text>

  <path class="line" d="M450 535 L520 785" />
  <text class="label" x="495" y="665">0..1 wallet</text>
  <path class="line" d="M450 545 L980 865" />
  <text class="label" x="760" y="690">0..1 wallet</text>

  <path class="dash" d="M1520 780 L900 780" />
  <text class="label" x="1210" y="760">logical relation by category name</text>

  <text class="note" x="90" y="1080">Physical Firestore mapping:</text>
  <text class="note" x="90" y="1110">- USER_PROFILE: users/{uid} plus Firebase Auth profile</text>
  <text class="note" x="90" y="1140">- HEALTH_DATA: users/{uid}/health_data/{date}</text>
  <text class="note" x="90" y="1170">- MEAL_PLAN: users/{uid}/meal_plans/{date}</text>
  <text class="note" x="90" y="1200">- MEAL_ITEM: nested object in meal_plans.meals</text>
  <text class="note" x="90" y="1230">- WALLET: wallets/{walletId}</text>
  <text class="note" x="90" y="1260">- EXPENSE: expenses/{expenseId}</text>
  <text class="note" x="90" y="1290">- SHOPPING_SCHEDULE: shopping_schedules/{scheduleId}</text>
  <text class="note" x="90" y="1320">- CATEGORY_BUDGET: category_budgets/{categoryBudgetId}</text>
</svg>
