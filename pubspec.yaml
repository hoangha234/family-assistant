name: family_assistant
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^7.1.0
  intl: ^0.20.2
  fl_chart: ^1.1.1
  bloc: ^8.1.4
  equatable: ^2.0.7
  flutter_bloc: ^8.1.6
  firebase_core: ^4.4.0
  firebase_storage: ^13.0.6
  cloud_firestore: 6.1.2
  firebase_auth: ^6.1.4
  firebase_app_check: ^0.4.1+4
  google_sign_in: 6.1.0
  http: ^1.2.0
  image: ^4.5.3
  image_picker: ^1.2.1
  pedometer: ^4.2.0
  permission_handler: ^12.0.1
  mqtt_client: ^10.11.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1A3A8F"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
